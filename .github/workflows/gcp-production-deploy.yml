name: Nomos DaaS - GCP Production
on:
  push:
    branches: [main, production]
    paths: [Nomos_Master.Py, requirements.txt, Dockerfile]
  pull_request:
    branches: [main, production]

env:
  REGISTRY: gcr.io
  SERVICE_NAME: nomos-daas-engine
  REGION: us-central1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v2
      - uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v1
      - run: gcloud auth configure-docker $REGISTRY
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
    steps:
      - uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v1
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest \
            --platform=managed \
            --region=${{ env.REGION }} \
            --service-account=${{ secrets.PRODUCTION_SERVICE_ACCOUNT }} \
            --no-allow-unauthenticated \
            --memory=4Gi \
            --cpu=2 \
            --timeout=3600 \
            --max-instances=100 \
            --min-instances=1 \
            --set-secrets="STRIPE_SECRET_KEY=stripe-secret-key-production:latest,SYSTEM_SALT=system-salt-production:latest,LEDGER_SIGNING_SECRET=ledger-signing-secret-production:latest" \
            --quiet
      - name: Verify deployment
        run: |
          sleep 30
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --platform managed --region ${{ env.REGION }} --format='value(status.url)')
          curl -sf $SERVICE_URL/ || exit 1
          echo "Production deployment verified"