steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nomos-daas-engine:$SHORT_SHA', '-t', 'gcr.io/$PROJECT_ID/nomos-daas-engine:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nomos-daas-engine']

images: ['gcr.io/$PROJECT_ID/nomos-daas-engine:$SHORT_SHA', 'gcr.io/$PROJECT_ID/nomos-daas-engine:latest']
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
timeout: '3600s'